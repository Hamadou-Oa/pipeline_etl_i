name: Pipeline ETL — Africa Tech Up Tour

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 6 * * *'   # Tous les jours à 6h UTC
  workflow_dispatch:        # Déclenchement manuel depuis GitHub

jobs:
  # ══════════════════════════════════════════
  # JOB 1 — Tests unitaires
  # ══════════════════════════════════════════
  tests:
    name: "Tests unitaires (29 tests)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer les tests
        run: |
          python -m coverage run -m pytest test_pipeline.py --no-cov -v
          python -m coverage report --rcfile=.coveragerc

      - name: Upload rapport couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/

  # ══════════════════════════════════════════
  # JOB 2 — Extraction des données
  # ══════════════════════════════════════════
  extraction:
    name: "Extraction 3 sources"
    runs-on: ubuntu-latest
    needs: tests   # Lance seulement si les tests passent

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CSV_URL: ${{ secrets.CSV_URL }}
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Extraction Web (books.toscrape.com)
        run: |
          python -c "
          from src.extraction.web_extractor import WebExtractor
          df = WebExtractor(max_pages=1).extract()
          print(f'✅ Web : {len(df)} livres extraits')
          print(df[['title','price','rating']].head(3).to_string())
          "

      - name: Extraction SQL (Supabase)
        run: |
          python -c "
          import os
          from dotenv import load_dotenv
          load_dotenv()
          from src.extraction.sql_extractor import SQLExtractor
          df = SQLExtractor(
              db_url=os.getenv('DATABASE_URL'),
              query='SELECT id::text AS title, email AS availability, NULL::float AS price, 0 AS rating, \'sql\' AS source FROM customers LIMIT 20'
          ).extract()
          print(f'✅ SQL : {len(df)} lignes extraites')
          "

      - name: Extraction CSV (Google Drive)
        run: |
          python -c "
          import os, pandas as pd
          from src.extraction.csv_extractor import CSVExtractor
          df = CSVExtractor(csv_url=os.getenv('CSV_URL', '')).extract()
          df = df.head(100)
          print(f'✅ CSV : {len(df)} lignes extraites')
          "

      - name: Résumé extraction
        run: |
          echo "════════════════════════════════"
          echo "✅ PIPELINE ETL — EXTRACTION OK"
          echo "════════════════════════════════"
          echo "Toutes les sources ont été extraites avec succès"

  # ══════════════════════════════════════════
  # JOB 3 — Validation DAG Airflow
  # ══════════════════════════════════════════
  validate_dag:
    name: "Validation DAG Airflow"
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Installer Airflow
        run: |
          pip install "apache-airflow==2.9.3" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.10.txt"

      - name: Valider le DAG
        run: |
          export AIRFLOW_HOME=/tmp/airflow
          export AIRFLOW__CORE__LOAD_EXAMPLES=False
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////tmp/airflow/airflow.db
          airflow db init
          airflow dags list
          echo "✅ DAG etl_pipeline_dag validé sur Linux"

